              - de
              - fr
              - it
              - en
      responses:
        "200":
          description: Response for success or error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ResponseWrapperSuccess"
                  - $ref: "#/components/schemas/ResponseWrapperError"
              examples:
                example-0:
                  summary: An example of response Success
                  value:
                    success: true
                    statusCode: 200
                    data: {}
                example-1:
                  summary: An example of response Error
                  value:
                    success: false
                    statusCode: 200
                    errorCode: 1064
                    message: bad token
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseWrapperError"
              example:
                value:
                  success: false
                  statusCode: 401
                  errorCode: 401
                  message: unauthorized access
