  /api/businesspartners/{foreignID}/users/{userUID}/profiles:
    put:
      tags:
        - Business Partner
      summary: Edit User Profiles
      description: |-
        Update a users profiles and profile groups for a given business partner.
        If the business partner exists.

        Profiles with `"enabled": true` will be added. Profiles with `"enabled":
        false` will be removed.

        The funtion is idempotent such that adding a profile that a user already
        has, has no effect. Also removing a profile a user does not have, has no
        effect.

        Profiles a user has that are not in the list are not affected, i.e. the
        user keeps those profiles.

        ### Authorization

        Only the following applications may use this endpoint:
         - Risico (24)
         - Savida (25)
         - Agir (26)
         - Connex (34)
         - ePortal User Management (50)
         - myESTV (200257)
         - Form (301337)
         - Swiyu Core (301346)

        ### Error Codes
        **`1118`: Business Partner not found**
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                profiles:
                  type: array
                  items:
                    type: object
                    properties:
                      profileForeignID:
                        type: string
                      enabled:
                        type: boolean
                ProfileGroup:
                  type: array
                  items:
                    type: object
                    properties:
                      profileGroupForeignID:
                        type: string
                      enabled:
                        type: boolean
              example:
                profiles:
                  - profileForeignID: MWSTPRO_EINREICHER
                    enabled: true
                  - profileForeignID: VST_SUBMITTER_PLUS
                    enabled: true
                ProfileGroup: null
      parameters:
        - name: foreignID
          in: path
          schema:
            type: string
          description: business partner foreign ID
          required: true
        - name: userUID
          in: path
          schema:
            type: string
          description: user UID
          required: true
        - name: noNotification
          in: query
          schema:
            type: string
          description: by default false. true = no notification is sent to the user.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseWrapper"
              examples:
                example-0:
                  value:
                    success: true
                    statusCode: 200
                    data: true
                example-1:
                  value:
                    success: false
                    statusCode: 200
                    errorCode: 1118
                    message: Business Partner not found
