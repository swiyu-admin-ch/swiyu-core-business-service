  /api/widget/config:
    get:
      tags:
        - Widget
      summary: Get Widget Configuration
      description: |-
        This endpoint returns the following information to configure a widget

        1.  inboxMail
            User's Notification Inbox url

        2.  profile
            User's Profile url link (to navigate user to his profile)

        3.  rights
            User's My permission tab url

        4.  login
            Login url (to navigate the user to login). Use parameter * returnURL* to return to the application directly after the login

        5.  logout
            Logout url link (to navigate the user to logout)

        6.  Settings
            User's settings tab url

        7.  All services
            ePortal main window url

        8.  polling
            Polling url for AJAX request (to populate the widget state)

        9.  pollingInterval
            Time interval for calling the polling url (in seconds)

        10.  avatars
            List of avatar images with the avatar ID. Store this list and use it with the avatarID response of the polling url.

        11.  applications
            List of applications with applicationID, name in 4 languages, url and image. Store this list and use it with the applicationIDs response of the polling url.

        ## Authorization

        The authorization token is not necessary.
      responses:
        "200":
          description: Response for success or error
          content:
            application/json:
              schema:
