---
openapi: 3.0.3
info:
  description: |-
    This document describes the REST API and resources provided by ePortal.
    To use a REST API, your application will make an HTTP request and parse the response.
    The response format is JSON. Your methods will be the standard HTTP methods like GET, PUT, POST and DELETE.
    Because the REST API is based on open standards, you can use any web development language to access the API.

    The current notification API documentation can be found in the notification API project.
  title: ePortal external (REST API)
  version: 1.7.0
servers:
  - url: https://pams-api.eportal.admin.ch
  - url: https://pams-api.eportal-a.admin.ch
  - url: https://pams-api.eportal-r.admin.ch
  - url: https://notification-api.eportal.admin.ch
  - url: https://notification-api.eportal-a.admin.ch
  - url: https://notification-api.eportal-r.admin.ch
tags:
  - name: Authentication
    description: ""
  - name: eIAM
    description: ""
  - name: API Selfservice
    description: ""
  - name: Business Partner
    description: ""
  - name: ONE & Connex
    description: ""
  - name: Group
    description: ""
  - name: Group Types
    description: ""
  - name: Roles
    description: ""
  - name: Notification
    description: |-
      Use the notification server for these requests `https://notification-api.eportal{{env}}.admin.ch`.
      The current notification API documentation can be found in the notification API project.
  - name: Profile
    description: ""
