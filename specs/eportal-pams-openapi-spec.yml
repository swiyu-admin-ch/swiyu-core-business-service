  /api/businesspartners:
    post:
      tags:
        - Business Partner
      summary: Create Businesspartner
      description: |-
        Add a new business partner in PAMS, with an existing user (that becomes
        an admin of this business partner) and at least one existing profile
        group.

        ### Authorization

        Only the following applications may use this endpoint:
        - Connex (34)
        - ePortal Notification (52)
        - myESTV (200257)
        - Form (301337)
        - Swiyu Core (301346)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessPartner"
            example:
              success: true
              statusCode: 200
              data:
                foreignID: SAP_NEW_BP_TEST
                name: My Business Partner
                addInfo: Interner EZV Geschäftspartner
                ProfileGroups:
                  - profileGroupForeignID: CONNEX-SELFCARE
                    name: Geschäftspartner DE
                    adminUserUIDs:
                      - 552431CB-A13C-49B1-7DEA-3357E6B646D9
                      - A68123E5-27E8-4121-7357-894A454EB728
                      - 858C8B48-3BC0-47C1-45F5-55698920900A
                      - BB54B73D-01CB-11E8-B814-005056AE5FB8

      parameters:
        - name: linkprofiles
          in: query
          schema:
            type: integer
          description: |-
            0 or 1, allows to indicate if the link between
            business and profiles should be built.
          example: "0"
      security:
        - applicationToken: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseWrapper"
              example:
                success: true
                statusCode: 200
  /api/businesspartners/{foreignID}:
    put:
      tags:
        - Business Partner
      summary: Update Businesspartner
      description: |-
        Update a business partner name, addInfo and profile group to user
        relations.

        ProfileGroups are always additive.

        ### Authorization

        Only the following applications may use this endpoint:
         - Connex (34)
         - ePortal Notification (52)
         - myESTV (200257)
         - Form (301337)
         - Swiyu Core (301346)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  description: business partner name.
                  type: string
                addInfo:
                  description: additional information of business partner
                  type: string
                ProfileGroups:
                  description: a
                  type: array
                  items:
                    type: object
                    required:
                      - profileGroupForeignID
                      - adminUserUIDs
                    properties:
                      profileGroupForeignID:
                        description: profile group foreign ID
                        type: string
                      name:
                        description: name of profile group
                        type: string
                      adminUserUIDs:
                        description: array of userUIDs to be the administrator ob this business partner.
                        type: array
                        items:
                          type: string
              example:
                name: My Business Partner (optional2)
                addInfo: Business partner details (optional2)
                ProfileGroups:
                  - profileGroupForeignID: BAZG_BIER_VERWALTEN
                    adminUserUIDs:
                      - 552431CB-A13C-49B1-7DEA-3357E6B646D9
                      - A68123E5-27E8-4121-7357-894A454EB728
                      - 7CDE937B-2A9C-46C6-4BB3-ACB7ACA671D9
                      - BB54B73D-01CB-11E8-B814-005056AE5FB8
                  - profileGroupForeignID: dataanalytics
                    adminUserUIDs:
                      - 552431CB-A13C-49B1-7DEA-3357E6B646D9
                      - A68123E5-27E8-4121-7357-894A454EB728
                      - 7CDE937B-2A9C-46C6-4BB3-ACB7ACA671D9
                      - BB54B73D-01CB-11E8-B814-005056AE5FB8
      parameters:
        - name: linkprofiles
          in: query
          schema:
            type: integer
          description: |-
            0 or 1, allows to indicate if the link between
            business and profiles should be built.
          example: "0"
        - name: foreignID
          description: business partner foreign ID
          in: path
          schema:
            type: string
          required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseWrapper"
              example:
                success: true
                statusCode: 200
    get:
      tags:
        - Business Partner
      summary: Get Business Partner
      description: |-
        Returns the business partners, it's profile groups foreign IDs and the
        admin userUID of the admin of those profile Groups.

        ### Authorization

        Only the following applications may use this endpoint:
         - Connex (34)
         - ePortal Notification (52)
         - myESTV (200257)
         - Form (301337)
         - Swiyu Core (301346)
      parameters:
        - name: lang
          description: language expected for the response.
          in: query
          schema:
            type: string
        - name: foreignID
          description: Business partner foreign ID.
          in: path
          schema:
            type: string
          required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
