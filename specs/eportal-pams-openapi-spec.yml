          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
                statusCode: 200
                data: >
                  -----BEGIN PUBLIC KEY-----
                  MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEArXEZQfQrfRGUsMRRQnXL
                  YufJdYhzVaNDCkki5AVo09lIYGnmAthr/H6pzenm4qlUSYyEWuYRImykgO9f7P3V
                  281H2o43re6V6RYakuhcXptBsHDBHIfJcuGaXUwU2Z1UmffaF4mpZMfIjlpQHZ3f
                  s1FQcGVJH4mQUmCWn3VZesed6+wdrp72ugeDoMPIni/lIUlCUF6fg5JNqvWMCOeb
                  qynzkV2FkJc/FG7wtKKuU5Qt1FeD/cIdSD5rdV0xq7amMMaxWpVizTgp628DM7sl
                  y9BLX6PDjR2QnMWo/fGCPzpbNUs4p0pjNBUkg3TiByRM5qGUUBk9/525fqFpalWg
                  qQIDAQAB
                  -----END PUBLIC KEY-----
  /api/saml2/eiam/logout:
    post:
      tags:
        - eIAM
      summary: EIAM Logout for Swisstax Migration
      description: |-
        This endpoint is used by EIAM during the migration of SwissTax users. It
        allows to initiate a disconnection of pams from EIAM applications. It
        will receive a SAML file which will have to be validated and then it
        will delete the user's connection cookies. It will then send back a SAML
        file to EIAM to validate the disconnection.

        To test this endpoint locally, it is necessary to have a file named
        `eiamLogoutRequest.xml` in the output folder of your working
        environment.

        This SAML file must contain the XML request as sent by EIAM.
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                SAMLRequest:
                  type: string
                  format: binary
      responses:
        "200":
          description: Successful response
          content:
            application/json: {}
  /api/selfservice/user/{userUID}/roles:
    get:
      tags:
        - API Selfservice
      summary: User Roles
      description: |-
        A business partner user can query all his roles in context with API and
        accross all tenants and in order to realise a connection.
        See
        [https://www.jira.estv.admin.ch/jira/browse/TPEFD-4090](https://www.jira.estv.admin.ch/jira/browse/TPEFD-4090)

        ## Security
        - Request needs to be done from one of these applications:
          - 51 (Application Manager)
          - 300906 (API Manager)
          - 91 (BAZG API Selfservice)
          - 300040 (ESTV API Selfservice)
        - User Login Level needs to be at least S2Plus
      parameters:
        - name: userUID
          in: path
          schema:
            type: string
          required: true
          example: BB54B73D-01CB-11E8-B814-005056AE5FB8
      security: [{ applicationToken: [], SSOCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelfServiceUserRolesResponse"
              example:
                success: true
                statusCode: 200
                data:
                  - tenantUID: FCA
                    tenantNameDE: EZV
                    tenantNameFR: AFD
                    tenantNameIT: AFD
                    tenantNameEN: FCA
                    BusinessPartnerRoles:
                      - businessPartnerForeignID: RED
                        businessPartnerName: Red company
                        roles:
                          - roleUID: Bier_Verwalten
                          - roleUID: Beer_Admin
                      - businessPartnerForeignID: BLUE
                        businessPartnerName: Blue company
                        roles:
                          - roleUID: devs-user
                          - roleUID: edvs-admin
  /api/selfservice/validate/businesspartners/{foreignID}/roles:
    put:
      tags:
        - API Selfservice
      summary: Business Partner Roles Validation
      description: |-
        Then for every role in parameter roleuids it is checked if the given
        business partner (foreignID variable) has a valid link to that role via
        business user where business user
        - is either linked to the profile as admin of a profile (Business User
        linked to Profile via tabProfileGroup)
        - or is normally linked to the profile (Business User linked to Profile
        via relBusinessUserProfile)

        Valid link is meant in the sense that linked profile group, profile and
        role are active and application type of application linked to role is 0
        (Web Service).

        All found roles from roleuid's list are then returned as true, all roles
        from roleuid's list which were not found are returned as false

        ## Security
        - Request needs to be done from one of these applications:
          - 51 (Application Manager)
          - 300906 (API Manager)
          - 91 (BAZG API Selfservice)
          - 300040 (ESTV API Selfservice)
      requestBody:
        content:
          application/json:
            schema:
              type: object
      parameters:
        - name: roleuids
          description: comma separated list of role uids
          in: query
          schema:
            type: string
          example: BAZG_Bier_Verwalten,devs-user,bla
        - name: foreignID
          in: path
          schema:
            type: string
          required: true
          example: BLUE_ESTV
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
                statusCode: 200
                data:
                  businessPartnerForeignID: BLUE_ESTV
                  roles:
                    BAZG_Bier_Verwalten: true
                    bla: false
                    devs-user: true
