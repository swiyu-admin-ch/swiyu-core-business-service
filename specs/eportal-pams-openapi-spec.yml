    create_group_invitations_v2_post:
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              required:
                - groups
                - rolesUID
              properties:
                groups:
                  description: Groups for which an invitation code will be created.
                  type: array
                  items:
                    type: object
                    required:
                      - groupUID
                    properties:
