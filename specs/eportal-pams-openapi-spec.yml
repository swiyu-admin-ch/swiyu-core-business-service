  /api/notification:
    get:
      tags:
        - Notification
      summary: Get Notifications
      description: |-
        Returns all notifications available for the current user.

        If it is called by ePortal, this endpoint will return all notifications
        related to the applications for which the user is registered according
        to the filters set in target.

        ### Authorization

        * The user must have access to the application affected by the
        notification.

        * The application token must be valid.
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: "{{token}}"
        - name: appIDs
          in: query
          schema:
            type: integer
          description: filter applicationID only (string comma separated values)
          example: "48,15"
        - name: lang
          in: query
          schema:
            type: string
          description: language of the messages to display (DE, FR, IT, EN)
        - name: types
          in: query
          schema:
            type: string
          description: filter by notification types (string comma separated values)
        - name: count
          in: query
          schema:
            type: boolean
          description: if true, the returned value only contains the number of read and unread notifications
        - name: unread
          in: query
          schema:
            type: boolean
          description: filter unread only
        - name: dueDate
          in: query
          schema:
            type: boolean
          description: filter dueDate only
        - name: sortBy
          in: query
          schema:
            type: string
          description: sort direction
        - name: orderBy
          in: query
          schema:
            type: string
          description: field to order the notifications
      responses:
        "200":
          description: Response for success or error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ResponseWrapperSuccess"
                  - $ref: "#/components/schemas/ResponseWrapperError"
              examples:
                example-0:
                  $ref: "#/components/examples/NotificationResponseSuccessExample"
    post:
      tags:
        - Notification
      summary: Add Notification
      description: |-
        Create a notification. In order for the sorting to be correct, make sure that you use a valid date and time 
        for the validFrom and validTo values.

        To maintain compatibility, it is currently not required to add a notificationTypeUUID. 
        Though this behavior will change in the future, it is highly recommended to add a notificationTypeUUID. 
        Please have a look at
        [External developer documentation](https://confluence.bit.admin.ch/display/EPORTAL/External+developer+documentation#Externaldeveloperdocumentation-Notifications)
        to add it accordingly.

        ### Authorization

        - An application can only create notifications for itself.
        - No cookie needed but a valid `Authorization` token to identify the source application.

        ### Error codes

        By success, the id of the generated notification is returned and can be used in the deactivation endpoint.

        By error, a code and a message are returned:

        - `1002`: application not allowed
        - `1003`: missing applicationID
        - `1005`: wrong 'date' format or value
        - `1006`: wrong 'date' range
        - `1007`: missing message or too long
        - `1024`: for user based notification, only 1 user can be targeted
        - `1175`: This notification type is reserved by PAMS and cannot be used
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationRequest"
            examples:
              example-0:
                $ref: "#/components/examples/NotificationRequestExample"
              example-1:
                $ref: "#/components/examples/NotificationRequestExample2"
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: "{{token}}"
      responses:
        "200":
          description: Response for success or error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ResponseWrapperSuccess"
                  - $ref: "#/components/schemas/ResponseWrapperError"
              examples:
                example-0:
                  summary: An example of response Success
                  value:
                    success: true
                    statusCode: 200
                    data: 177
                example-1:
                  summary: An example of response Error
                  value:
                    success: false
                    statusCode: 200
                    errorCode: 1002
                    message: application not allowed
