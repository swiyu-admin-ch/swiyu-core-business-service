paths:
  /api/login:
    get:
      tags:
        - Authentication
      summary: Login
      description: |-
        Direct login links can be implemented by redirecting the user to this page. There are various url parameters to customise the login behaviour.
        Login will redirect to eIAM and generate the authentication cookie after correct login.
      parameters:
        - name: returnURL
          in: query
          description: URL to which the user should be redirected. This parameter can also be `returlUrl` or `returnurl`
          schema:
            type: string
        - name: appid
          in: query
          description: allows us to specify the return URL with an application URL. Ignored if `returnURL`parameter is filled
          schema:
            type: string
        - name: language
          in: query
          description: set the language for eIAM
          schema:
            type: string
        - name: stepup
          in: query
          description: force to step up to 2 factor authentication
          schema:
            type: boolean
        - name: guestlogin
          in: query
          description: force to go to eIAM guest login window
          schema:
            type: boolean
        - name: stepup3plus
          in: query
          description: force to step up to level 3+ login
          schema:
            type: boolean
      security: [] # no authentication
      responses:
        "200":
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: text/html; charset=utf-8
            Set-Cookie:
              schema:
                type: string
                example: |-
                  pams=...;
                  path=/; domain=admin.ch; HTTPonly; Secure
          content:
            text/plain:
              schema:
                type: string
  /api/autologin:
    get:
      deprecated: true
      tags:
        - Authentication
      summary: Autologin (deprecated)
      description: |-
        Deprecated, use /api/v2/autologin instead.
      responses:
        "200":
          description: OK
    post:
      deprecated: true
      tags:
        - Authentication
      summary: Autologin (deprecated)
      description: |-
        Deprecated, use /api/v2/autologin instead.
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
  /api/v2/autologin:
    get:
      tags:
        - Authentication
      summary: Autologin V2
      description: |-
        Autologin checks if a user is authenticated and returns basic user information,
        along with the users roles. A check compares the required login level of the application
        (sent in token in the header `Authorization`) with the login level of the current user.
        ### Error codes
        **`1141`: Insufficient Login Level**: if the login level of the user is lower than the login level of the application
        **`1142`: Validation of Login Level failed** in case of login level validation error.
      security: [{ applicationToken: [], SSOCookie: [] }]
      parameters:
        - name: Authorization
          description: JWT bearer
          in: header
          schema:
            type: string
        - name: withHasRole
          description: If you specify this boolean parameter, the response will contain a field saying if the user has a role or not.
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutologinResponse"
              examples:
                example-0:
                  summary: Mode 1 application
                  value:
                    success: true
                    statusCode: 200
                    data:
                      level: S3+OK
                      profile:
                        firstName: Edith
                        lastName: Latrop
                        userUID: BB54B73D-01CB-11E8-B814-005056AE5FB8
                        extEIAMID: "216480"
                        language: en
                        eportalLanguage: en
                        isSupport: true
                        username: Edith Latrop
                      groups:
                        - groupID: 6582
                          groupUID: "6582"
                          groupForeignID: "6582"
                          applicationID: 51
                          isOwner: true
                          name: All ESTV
                          parentGroupID:
                            value: 0
                            isset: false
                          roles:
                            - 211
                          rolesRights:
                            - uid: application_admin
                              isAdmin: true
                              isExclusive: true
                              name: Portal Administrator
                      hasRole: true
                example-1:
                  summary: Mode 2 application
                  value:
                    success: true
                    statusCode: 200
                    data:
                      level: S2+OK
                      profile:
                        firstName: Edith
                        lastName: Latrop
                        userUID: BB54B73D-01CB-11E8-B814-005056AE5FB8
                        extEIAMID: "216480"
                        language: en
                        eportalLanguage: en
                        isSupport: true
                        username: Edith Latrop
                      businesspartners:
                        - id: "5202113221"
                          description: Bantiger Elektro AG (CHE-115.308.306)
                          roles:
                            - uid: PARTNER_READ
                              isAdmin: false
                              isExclusive: false
                              name: |-
                                Daten des/der registrierten Unternehmens/Person
                                lesen
                example-2:
                  summary: User not logged in
                  value:
                    success: true
                    statusCode: 200
                    data:
                      level: SA
                      profile:
                        lastName: Anonymous
                        username: Anonymous
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseWrapperError"
              examples:
                example-0:
                  summary: Insufficient Login Level
                  value:
                    success: false
                    statusCode: 401
                    errorCode: 1141
                    message: Insufficient Login Level
                example-1:
                  summary: Validation of Login Level failed
                  value:
                    success: false
                    statusCode: 401
                    errorCode: 1142
                    message: Validation of Login Level failed
  /api/logout:
    post:
      tags:
        - Authentication
      summary: Logout
      description: |-
        Logout from ePortal and from eIAM. After logout, it should
        return to the application url. In the default case you will be
        redirected to the ePortal start page.
      requestBody:
        content:
          application/json:
            schema:
              type: object
      parameters:
        - name: appid
          description: The return address will be the address specify by this parameter
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
