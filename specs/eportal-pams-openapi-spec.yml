  /api/widget/state:
    get:
      tags:
        - Widget
      summary: Get Widget State URLs
      description: |-
        The PAMS SSO Cookie MUST be provided with this request.

        This endpoint returns the following information to a widget:

        1.  count
            Users current none red Notification inbox count.

        2.  profile
            Users *fullname* and *avatarID*

        3.  lastUsedApps & favoriteApps
            1.  ApplicationIDs of users last used and favorite applications.
            2.  ChildID (if the application is a child application).
            3.  access ok flag
            4.  application online flag

        4.  loginState
            Users login level (*S0*, *S1*, *S2*, *S2+*, *S3*, *S3+*)

        If the *loginState* is *S0* or *S1*, no other information will be
        provided, as there is no user.


        ## Authorization

        The authorization token is not necessary.


        ### **Remark:**

        To help with the load on our server and the browser, we suggest storing
        the users avatarID and favourite/last used applicationIDs and only
        getting the details if they change.
      responses:
        "200":
          description: Response for success or error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ResponseWrapperSuccess"
                  - $ref: "#/components/schemas/ResponseWrapperError"
              examples:
                example-0:
                  summary: An example of response Success without login
                  value:
                    success: true
                    statusCode: 200
                    data:
                      messageCount: 0
                      profile:
                        fullname: ""
                        avatarID: 0
                      lastUsedApps: null
                      favoriteApps: null
                      loginState: SA
                example-1:
                  summary: An example of response Success with logged in user
                  value:
                    success: true
                    statusCode: 200
                    data:
                      messageCount: 17
                      profile:
                        fullname: M***** G***
                        avatarID: 2
                      lastUsedApps:
                        - appID: 87
                          childAppID: 0
                          accessOK: true
                          online: true
                        - appID: 300844
                          childAppID: 0
                          accessOK: true
                          online: true
                        - appID: 200257
                          childAppID: 0
                          accessOK: true
                          online: true
                      favoriteApps:
                        - appID: 83
                          childAppID: 0
                          accessOK: true
                          online: true
                      loginState: S3+OK
