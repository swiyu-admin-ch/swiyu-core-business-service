  /api/m2m/applications/{applicationID}/groups:
    post:
      tags:
        - Machine2Machine
      summary: Create Group
      description: |-


        Create a new group for an application in mode 1.
        This endpoint can be used without a user by applications allowed to call m2m endpoints.
        The applicationID in the path should be the applicationID from the application who wants to create the group.
        This applicationID must match the applicationID from the given token.
        Because this endpoint is called without user, there will be made no owner set for this group.

        ## Authorization
        The authorization token of caller application.

        ### Error codes
        - `1083`: GroupType doesn't exist
        - `1138`: GroupName is missing: Mandatory field missing
        - `1140`: The group name is too long
        - `1182`: Parent Group doesn't exist or is inactive
        - `1184`: GroupForeignID must only contain alphanumeric characters and hyphens, and be less than 45 characters long
        - `1186`: Group Foreign ID already exists
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: "{{token}}"
        - name: applicationID
          in: path
          required: true
          schema:
            type: number
          example: 11
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Group_create"
            examples:
              example-0:
                summary: All values
                value:
                  name: New Group
                  groupForeignID: ABC-DEF-123
                  groupTypeUUID: 1aa1a11a-1aa1-43da-bd3b-0a90767e9ffa
                  parentGroupUUID: 1aa1a11a-7bc4-11aa-bd3b-0a90767e9ffa
              example-1:
                summary: Only required values
                value:
                  name: New Group 1
      responses:
        "200":
