  /api/redeem/{invitation-code}:
    get:
      tags:
        - Invitation
      summary: |-
        Redeem an invitation code (Deprecated should be replaced by the POST
        version of this endpoint)
      description: |-
        The endpoint to use an invitation code to have an access to an
        application.

        The application's (which is calling this endpoint) token is required


        ## Authorization

        No authorization is granted if the code does not match internal pattern.
        For the internal code, a valid user must exists.

        Unauthorized is returned when no user is found in context


        ## Error codes

        The error codes are processed in the following order and the behaviour
        is fail-fast.

        *   401 Unauthorized

        *   1020 Invalid invitation code - when code was note found though was a
        valid internal code pattern.

        *   1022 InvitationCodeExpired. If trying to redeem code with validUntil
        date > today.

        *   1039 InvitationCodeDisabled. If trying to redeem revoked invitation
        code.

        *   1054 InvitationCodeAlreadyUsed. If code has already been redeemed.

        *   1056 InvitationCodeEmpty InvitationCodeEmpty when no invitation
        profile IDs or no invitation profile group IDs can be found

        *   1058 InvitationCodeBusinessPartnerNotFound if invitation mode is
        mode2 and there is no Business Partner found.(May occur when BP was
        deleted after code was created)
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: "{{token}}"
        - name: invitation-code
          in: path
          schema:
            type: string
          required: true
          description: |-
            There are two kinds of invitation code:

            * internal e-portal invitation code which must match regex pattern of:  
            hexadecimal numbers (00 - ff) in sequence  
            (8-4-4-12) where the digit is count of hexadecimal digits.
            * external invitation code, which is generated by the external
            application (but declared in ePortal). In this case, the route will be
            rerouted to this application.
      responses:
        "200":
          description: Response for success or error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ResponseWrapperSuccess"
                  - $ref: "#/components/schemas/ResponseWrapperError"
              examples:
                example-0:
                  summary: Invitation code is not valid
                  value:
                    success: false
                    statusCode: 200
                    errorCode: 1020
                    message: invitation code is not valid
                example-1:
                  summary: Succeeded Response for Mode 2 Application
                  value:
                    success: true
                    statusCode: 200
                    data:
                      mode: 2
                      businessPartnerName: Red company EZV
                      businessPartnerForeignID: RED_EZV
                      applications:
                        - applicationID: 32
                          name: Biera
                          subtitle: Beer tax declaration and refund
                          url: https://ref-vsp.ezv.admin.ch/beer
                          loginLevel: 3
                          identityClarified: false
                          image:
                            src: |-
                              data:image/svg+xml;base64,
                          isPublic: true
                          status: 1
                          tenant: EZV
                          roles:
                            - roleID: 156
                              roleName: BAZG Bier Verwalten DE
                          code: 0
                        - applicationID: 50
                          name: User Management
                          subtitle: Create invitation codes and manage users
                          url: https://user.eportal-d.admin.ch
                          loginLevel: 2
                          identityClarified: false
                          image:
                            src: |-
                              data:image/svg+xml;base64,
                          isFavourite: true
                          lastLogin: "2020-10-12"
                          status: 1
                          tenant: PORTAL
                          roles:
                            - roleID: 152
                              roleName: "PAMS User Admin "
                            - roleID: 240
                              roleName: Support View Admin
                            - roleID: 241
                              roleName: Support View User
                          code: 0
                example-2:
                  summary: Succeeded Response for Mode 1 Application
                  value:
                    success: true
                    statusCode: 200
                    data:
                      mode: 1
                      groupID: 6758
                      groupName: All ESTV
                      applications:
                        - applicationID: 52
                          name: PAMS Correspondance
                          subtitle: Portal and application notifications
                          url: ""
