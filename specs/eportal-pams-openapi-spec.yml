              type: object
              required:
                - name
                - groupTypeID
                - rolesID
              properties:
                name:
                  description: Name of the new group
                  type: string
                groupTypeID:
                  description: GroupType for the new group
                  type: number
                rolesID:
                  description: List of roles for which you want create the invitation code
                  type: array
                  items:
