server:
  port: 8200 # custom to avoid conflicts with swiyu-ecosystem-portal-scs which has 8080
  shutdown: immediate

app:
  governmental-allowlist:
    partner-id: 40f377d5-cd11-458a-944b-0c4f73f2ddaa # DEV/REF
  identifier-registry:
    did-tdw-route-template: "https://identifier-reg-d.trust-infra.swiyu.admin.ch/api/v1/did/{0}"
    did-web-template: "did:web:identifier-reg-d.trust-infra.swiyu.admin.ch:api:v1:did:{0}"
    default-public-resolve-url-template: https://identifier-reg-d.trust-infra.swiyu.admin.ch/api/v1/did/%s
    additional-public-resolve-url-templates:
      - https://identifier-reg-d.trust-infra.swiyu.admin.ch/api/v1/did/%s
      - https://identifier-data-service-d.apps.p-szb-ros-shrd-npr-01.cloud.admin.ch/api/v1/did/%s
      - http://localhost:8190/api/v1/did/%s
  status-registry:
    data-url-template: https://status-reg-d.trust-infra.swiyu.admin.ch/api/v1/statuslist/{0}.{1}
  trust-registry:
    data-service-base-url: https://trust-reg-d.trust-infra.swiyu.admin.ch/

pams:
  mock: true
  api:
    issued-by: "unused-dummy-value" # required value, but not need when using mock
    private-key: "unused-dummy-value" # required value, but not need when using mock

jeap:
  logging:
    platform: none # just some value other than "rhos"
  security:
    oauth2:
      resourceserver:
        authorization-server:
          issuer: https://swiyu-oauth-mock-server-d.apps.p-szb-ros-shrd-npr-01.cloud.admin.ch
          jwk-set-uri: https://swiyu-oauth-mock-server-d.apps.p-szb-ros-shrd-npr-01.cloud.admin.ch/.well-known/jwks.json
          introspection:
            client-secret: "secret"
            uri: https://swiyu-oauth-mock-server-d.apps.p-szb-ros-shrd-npr-01.cloud.admin.ch/oauth2/introspect
#         Uncomment the following lines to use the local mock server
#          issuer: http://localhost:8480
#          jwk-set-uri: http://localhost:8480/.well-known/jwks.json
#          introspection:
#            client-secret: "secret"
#            uri: http://localhost:8480/oauth2/introspect
#         Uncomment the following lines to use the dev keycloak server
#          issuer: https://auth-d.trust-infra.swiyu.admin.ch/realms/bj-swiyu-ecosystem
#          jwk-set-uri: https://swiyu-oauth-server-d.apps.p-szb-ros-shrd-npr-01.cloud.admin.ch/realms/bj-swiyu-ecosystem/protocol/openid-connect/certs
#          introspection:
#            client-secret: "" # copy from keycloak
        auth-servers:
          - issuer: https://keymanager-npr-intra.api.admin.ch/keycloak/realms/APIGW
            jwk-set-uri: https://keymanager-npr-intra.api.admin.ch/keycloak/realms/APIGW/protocol/openid-connect/certs
            authentication-contexts:
              - B2B
            introspection:
              client-id: "portal-B2B"
              client-secret: "{noop}secret"
          - issuer: https://keymanager-npr.api.admin.ch/keycloak/realms/APIGW
            jwk-set-uri: https://keymanager-npr.api.admin.ch/keycloak/realms/APIGW/protocol/openid-connect/certs
            authentication-contexts:
              - B2B
            introspection:
              client-id: "portal-B2B"
              client-secret: "{noop}secret"

  monitor:
    prometheus:
      user: "prometheus"
      password: "{noop}test"
  messaging:
    kafka:
      # Local kafka setup is configured to use plain text communication
      bootstrapServers: "http://localhost:9092"
      schemaRegistryUrl: "http://localhost:8081"
      securityProtocol: PLAINTEXT
      messageTypeEncryptionDisabled: true
  s3:
    client:
      endpoint-url: http://localhost:8202/
      access-key: "dev"
      secret-key: "devsecret"
      tls: false
  antivirus-service:
    url: http://localhost:8203/
    username: "dev"
    password: "devsecret"

spring:
  autoconfigure:
    exclude:
      - ch.admin.bit.jeap.monitor.metrics.health.HealthMetricsAutoConfig # since it invokes external health endpoints which are available in local profile
      # vault config loggers require jeap.vault.* properties only available when vault is enabled
      - ch.admin.bit.jeap.vault.config.JeapVaultKubernetesConfigLogger
      - ch.admin.bit.jeap.vault.config.JeapVaultAppRoleConfigLogger
  cloud:
    vault:
      enabled: false # encryption is disabled locally via messageTypeEncryptionDisabled, no Vault needed
  datasource:
    core-db:
      type: com.zaxxer.hikari.HikariDataSource
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://localhost:5432/bj_swiyu_ti_ctrl_core_db
      username: postgres
      password: secret
    identifier-registry-db:
      type: com.zaxxer.hikari.HikariDataSource
      driver-class-name: org.postgresql.Driver
      url: 'jdbc:postgresql://localhost:5180/identifier-registry-db'
      username: postgres
      password: secret
    status-registry-db:
      type: com.zaxxer.hikari.HikariDataSource
      driver-class-name: org.postgresql.Driver
      url: 'jdbc:postgresql://localhost:5280/status-registry-db'
      username: postgres
      password: secret
  flyway:
    enabled: true
    locations: [] # keep empty since on local we don't want afterMigrate script
  docker:
    compose:
      enabled: true
      file: docker-compose.local.yml
      start:
        arguments: [ "--remove-orphans", "--no-recreate" ]

management:
  endpoint:
    health:
      show-details: always
      show-components: always
  endpoints:
    web:
      exposure:
        include: "*"

database-migration: # under local development we want to run the migrations on startup
  startup-migrate-mode-enabled: true
  init-container: false

cors:
  allowed-origins:
    - 'http://localhost:8080' # the local endpointUrl of swiyu-ecosystem-portal-scs

logging:
  level:
    ch.admin.bit.jeap: INFO
    ch.admin.bj.swiyu: DEBUG
    ch.admin.bit.jeap.log.RestRequestTracer: DEBUG
    io.confluent.kafka: ERROR
    org.springframework.kafka: ERROR
    ch.admin.bit.jeap.messaging.kafka: ERROR
    org.apache.kafka: ERROR
    software.amazon: WARN

features:
  EID_5540_UPDATE_IS_GOVERNMENT: true
  EIDARTFE_754_VC_SCHEMA: true
  EIDARTFE_1204_TRUST_ADD_DIDS: true
  EIDARTFE_1220_PROOF_OF_POSSESSION: true