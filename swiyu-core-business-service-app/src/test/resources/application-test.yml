server:
  port: 1235
spring:
  autoconfigure:
    exclude:
      # metics not tested in integration tests, therefore excluded
      - ch.admin.bit.jeap.monitor.metrics.health.HealthMetricsAutoConfig
      - ch.admin.bit.jeap.monitor.metrics.rest.RestTracingMetricsAutoConfig
      - ch.admin.bit.jeap.monitor.metrics.security.RestSecurityTracingMetricsAutoConfig
      # vault config loggers require jeap.vault.* properties only available when vault is enabled
      - ch.admin.bit.jeap.vault.config.JeapVaultKubernetesConfigLogger
      - ch.admin.bit.jeap.vault.config.JeapVaultAppRoleConfigLogger
  cloud:
    vault:
      enabled: false # encryption is disabled in tests via messageTypeEncryptionDisabled, no Vault needed
  datasource:
    core-db:
      type: com.zaxxer.hikari.HikariDataSource
      driver-class-name: org.postgresql.Driver
      # url,user, pw are provided by PostgresSqlContainerInitializer
    identifier-registry-db:
      type: com.zaxxer.hikari.HikariDataSource
      driver-class-name: org.postgresql.Driver
      # url,user, pw are provided by PostgresSqlContainerInitializer
    status-registry-db:
      type: com.zaxxer.hikari.HikariDataSource
      driver-class-name: org.postgresql.Driver
      # url,user, pw are provided by PostgresSqlContainerInitializer
    hikari:
      maximum-pool-size: 2
  flyway:
    enabled: true # locations are defined in PersistenceConfig classes since we have multiple datasources
    locations: [] # keep empty since on test we don't want the default afterMigrate scripts in "extra" folder

jeap:
  logging:
    platform: none # just some value other than "rhos"
  security:
    oauth2:
      resourceserver:
        authorization-server:
          # relevant for pact: this issuer name is needed for jeap based pact tests to validate jwt tokens
          issuer: "http://localhost/auth"
          # relevant for pact: jeap will provide a test jwks.json when running pact tests under that address
          jwk-set-uri: "http://localhost:${server.port}/.well-known/jwks.json"
          introspection:
            client-id: dummy-client-id
            client-secret: dummy-client-secret
  messaging:
    kafka:
      bootstrapServers: "http://localhost:9092"
      schemaRegistryUrl: "http://localhost:7781"
      username: user
      password: user-secret
      securityProtocol: SASL_PLAINTEXT
      publishWithoutContractAllowed: true
      consumeWithoutContractAllowed: true
      messageTypeEncryptionDisabled: true
  # s3:
  #   client: # set by S3ContainerInitializer
  antivirus-service:
    username: "dev"
    password: "devsecret"
    url: "http://not.required.local"

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

database-migration: # under local development we want to run the migrations on startup
  startup-migrate-mode-enabled: true
  init-container: false

app:
  governmental-allowlist:
    partner-id: 40f377d5-cd11-458a-944b-0c4f73f2ddaa # DEV/REF
  status-registry:
    data-url-template: "TEST.DATAURL/{0}.{1}"
  identifier-registry:
    did-tdw-route-template: "HTTP:TESTROUTE:{0}"
    did-web-template: "DID:TESTROUTE/{0}"
    default-public-resolve-url-template: https://identifier-reg-d.trust-infra.swiyu.admin.ch/api/v1/did/ # We ignore the actual identifier value for test, so no suffix %s
    additional-public-resolve-url-templates:
      - https://identifier-reg-d.trust-infra.swiyu.admin.ch/api/v1/did/ # We ignore the actual identifier value for test, so no suffix %s
      - https://identifier-reg-r.trust-infra.swiyu.admin.ch/api/v1/did/ # We ignore the actual identifier value for test, so no suffix %s
      - https://identifier-reg.trust-infra.swiyu-int.admin.ch/api/v1/did/ # We ignore the actual identifier value for test, so no suffix %s
  trust-registry:
    data-service-base-url: https://trust-data-service-d.apps.p-szb-ros-shrd-npr-01.cloud.admin.ch/
  jobs:
    trust-additional-dids-submission-cleanup-interval: 10m
    trust-onboarding-submission-cleanup-interval: 10m
  limits:
    identifier:
      default-max-count: 100
      did-doc:
        max-size: 1MB
      did-log:
        max-size: 1MB
    statuslists:
      default-max-count: 100
      min-size: 200B
      max-size: 200KB
      max-age: 1000d
    trust-additional-dids-submission:
      max-age-in-unsubmitted: 1m
    trust-onboarding-submission:
      proof-of-possession:
        issuance-to-validity-duration: 1d
      documents:
        allowed-content-types:
          - "application/pdf"
        min-file-size: 1B
        max-file-size: 1MB
        default-max-count-per-submission: 10
        default-max-count-per-business-partner: 10
      max-age-in-unsubmitted: 1m

