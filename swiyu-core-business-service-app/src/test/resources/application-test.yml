    ch.admin.bit.jeap: WARN
    ch.admin.bj.swiyu: WARN
    # disable kafka warnings on tests (a lot of noise)
    io.confluent.kafka: ERROR
    org.springframework.kafka: ERROR
    ch.admin.bit.jeap.messaging.kafka: ERROR
    org.apache.kafka: ERROR
    org.apache.zookeeper: ERROR
    # for pact issue debugging
    au.com.dius.pact: WARN
    au.com.dius.pact.core.matchers: WARN
    # for transaction/sql logs set to TRACE / DEBUG
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.transaction: WARN

